<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Social - Gojo Style</title>
    <link rel="stylesheet" href="style.css"> 
    <style>
        body {
            margin: 0;
            height: 100vh;
            background: url('https://giffiles.alphacoders.com/223/223158.gif') no-repeat center center fixed;
            background-size: cover;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', sans-serif;
            color: white;
        }
    </style>
    <script>
        const navLinks = document.querySelectorAll('.nav-box');
        const clickSound = document.getElementById('click-sound');

        navLinks.forEach(link => {
            link.addEventListener('click', function(e) {
                e.preventDefault(); 
                clickSound.currentTime = 0;
                clickSound.play();
                const targetUrl = this.getAttribute('href'); 
                setTimeout(() => { window.location.href = targetUrl; }, 300); 
            });
        });
    </script>
</head>

<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gửi Huyền - Tạm Biệt</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', Roboto, sans-serif;
            background-color: #050505;
        }

        /* NỀN GIF CHILL BUỔI TỐI */
        .bg-gif {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            /* Link GIF phong cảnh đêm buồn/chill */
            background-image: url('https://i.pinimg.com/originals/81/15/8e/81158e8055c0919363a0f7c23177f11c.gif');
            background-size: cover;
            background-position: center;
            z-index: -1;
            filter: brightness(0.4);
        }

        /* KHUNG KÍNH MỜ TRONG SUỐT */
        .glass-box {
            text-align: center;
            padding: 50px 60px;
            background: rgba(255, 255, 255, 0.07);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 40px; /* Góc tròn mềm mại */
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.6);
            max-width: 80%;
            
            /* Hiệu ứng khung hiện lên */
            opacity: 0;
            transform: translateY(30px);
            animation: boxFadeIn 2s ease forwards;
        }

        @keyframes boxFadeIn {
            to { opacity: 1; transform: translateY(0); }
        }

        /* CHỮ GOODBYE CHÍNH GIỮA */
        #goodbye-btn {
            font-size: 3.2rem;
            color: #fff;
            margin: 0;
            cursor: pointer;
            font-weight: 300;
            letter-spacing: 10px;
            transition: 0.6s cubic-bezier(0.4, 0, 0.2, 1);
            text-shadow: 0 0 20px rgba(255,255,255,0.2);
        }

        #goodbye-btn:hover {
            letter-spacing: 18px;
            color: #a5ccff;
            text-shadow: 0 0 30px rgba(165,204,255,0.5);
        }

        /* HIỆU ỨNG ĐÁNH MÁY "CHẠM VÀO ĐÂY" */
        .typing-container {
            margin-top: 25px;
            height: 20px;
        }

        .typing-text {
            color: rgba(255, 255, 255, 0.5);
            font-size: 0.85rem;
            letter-spacing: 2px;
            overflow: hidden;
            white-space: nowrap;
            border-right: 2px solid rgba(255,255,255,0.7);
            display: inline-block;
            width: 0;
            animation: typing 3s steps(40) 2s forwards, blink 0.8s infinite;
        }

        @keyframes typing {
            from { width: 0 }
            to { width: 100% }
        }

        @keyframes blink {
            50% { border-color: transparent }
        }

        /* LỜI TỪ BIỆT DÀNH CHO HUYỀN */
        #farewell-content {
            display: none;
            color: #fff;
            animation: fadeInMsg 2.5s ease;
        }

        #farewell-content h2 {
            font-weight: 300;
            font-size: 1.8rem;
            color: #a5ccff;
            margin-bottom: 20px;
        }

        #farewell-content p {
            margin: 12px 0;
            font-size: 1.1rem;
            line-height: 1.8;
            font-weight: 300;
            opacity: 0.9;
        }

        @keyframes fadeInMsg {
            from { opacity: 0; }
            to { opacity: 1; }
        }
    </style>
</head>
<body>

    <div class="bg-gif"></div>

    <div class="glass-box" id="main-box">
        <div id="start-screen">
            <h1 id="goodbye-btn" onclick="sayFarewell()">HELLO</h1>
            <div class="typing-container">
                <span class="typing-text">( Có một lời nhắn tới BẠN... )</span>
            </div>
        </div>

        <div id="farewell-content">
            <h2>Gửi Huyền,</h2>
            <p>NGỦ NGON</p>
            <p>NGỦ NGON</p>
            <p>NGỦ ĐI ,NGỦ đi, NGủ đi</p>
            <p style="margin-top: 30px; font-style: italic; color: #a5ccff;">NGÚ ĐI NHÁ KU MAI ĐI HỌC </p>
        </div>
    </div>

    <script>
        function sayFarewell() {
            // Hiệu ứng mờ dần màn hình bắt đầu
            document.getElementById('start-screen').style.display = 'none';
            
            // Hiện nội dung thư
            const content = document.getElementById('farewell-content');
            content.style.display = 'block';
            
            // Làm tối nhẹ khung hình để đọc chữ rõ hơn
            document.getElementById('main-box').style.background = 'rgba(0, 0, 0, 0.4)';
        }
    </script>
</body>
