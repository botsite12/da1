<!DOCTYPE html>
<html lang="vi">
<head>

<body>

    <img src="https://media.giphy.com/media/v1.Y2lkPWVjZjA1ZTQ3NmJ3MXlybGFubHUzZm1razJwdTF5Z29xMTF4YzhjMXhlbno4Mnk1eSZlcD12MV9naWZzX3JlbGF0ZWQmY3Q9Zw/GC7C2Fi902BDG/giphy.gif" alt="Background" class="bg-gif">

    <div class="glass-box" id="main-box">
        <div id="start-screen">
            <h1 id="goodbye-btn" onclick="sayFarewell()">HELLO</h1>
            <p>( nhấn vào Có một lời nhắn tới BẠN HỮU... )</p>
        </div>

        <div id="farewell-content">
            <h2>Gửi Hữu,</h2>
            <p>NGỦ NGON</p>
            <p>NGỦ ĐI, NGỦ ĐI, NGỦ ĐI</p>
            <p>NGỦ ĐI, NGỦ ĐI, NGỦ ĐI</p>
            <p>NGỦ ĐI, NGỦ ĐI, NGỦ ĐI</p>
            <p style="margin-top: 20px; font-style: italic; color: #a5ccff;">NGỦ ĐI THẰNG L</p>
        </div>
    </div>

    

    <script>
        function sayFarewell() {
            document.getElementById('start-screen').style.display = 'none';
            document.getElementById('farewell-content').style.display = 'block';
            document.getElementById('main-box').style.background = 'rgba(0, 0, 0, 0.4)';
        }
    </script>
    <nav class="ios-dock">
    <a href="index.html" class="nav-item active">Home</a>
    <a href="index1.html" class="nav-item">Facebook</a>
    <a href="bye1.html" class="nav-item">1</a>
    <a href="bye2.html" class="nav-item">2</a>
</nav>

<style>
    /* Thanh chứa (Container) */
    .ios-dock {
        position: fixed;
        bottom: 30px; /* Cách mép dưới màn hình */
        left: 50%;
        transform: translateX(-50%);
        
        /* Hiệu ứng kính mờ (Glassmorphism) */
        background: rgba(255, 255, 255, 0.1); 
        backdrop-filter: blur(20px);
        -webkit-backdrop-filter: blur(20px);
        
        border: 1px solid rgba(255, 255, 255, 0.15);
        border-radius: 40px; /* Bo góc cực tròn kiểu iOS */
        padding: 10px 25px;
        display: flex;
        gap: 25px;
        box-shadow: 0 10px 25px rgba(0, 0, 0, 0.3);
        z-index: 999;
    }

    /* Các nút điều hướng */
    .nav-item {
        color: rgba(255, 255, 255, 0.8);
        text-decoration: none;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        font-weight: 500;
        font-size: 15px;
        transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        padding: 8px 12px;
        border-radius: 20px;
    }

    /* Hiệu ứng khi di chuột qua */
    .nav-item:hover {
        color: white;
        background: rgba(255, 255, 255, 0.2);
        transform: translateY(-2px);
    }

    /* Trạng thái active */
    .nav-item.active {
        color: white;
        font-weight: 700;
    }
</style>
</body>
