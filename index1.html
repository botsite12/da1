<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <link href="https://images.rbxcdn.com/e854eb7b2951ac03edba9a2681032bba.ico" rel="icon">
    <title>CÁC LOẠI ID</title>
    <link rel="stylesheet" href="style.css"> 
    <style>
        body {
            margin: 0;
            height: 100vh;
            background: url('https://giffiles.alphacoders.com/223/223158.gif') no-repeat center center fixed;
            background-size: cover;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', sans-serif;
            color: white;
        }
    </style>
    <script>
        const navLinks = document.querySelectorAll('.nav-box');
        const clickSound = document.getElementById('click-sound');

        navLinks.forEach(link => {
            link.addEventListener('click', function(e) {
                e.preventDefault(); 
                clickSound.currentTime = 0;
                clickSound.play();
                const targetUrl = this.getAttribute('href'); 
                setTimeout(() => { window.location.href = targetUrl; }, 300); 
            });
        });
    </script>
</head>
<body>
    

   
    <nav class="navbar">
    <a href="index.html" class="nav-box"> Home</a>
    <a href="index1.html" class="nav-box">FACEBOOK</a>
    <a href="bye1.html" class="nav-box">1</a>
    <a href="bye2.html" class="nav-box">2</a>
</nav>



    <div class="social-container">
        <h2 class="title">Kết nối với tôi</h2>
        <a href="https://www.facebook.com/bot.ahihi.505/" class="social-card" target="_blank">Facebook</a>
        <a href="https://www.tiktok.com/@theantiktok" class="social-card" target="_blank">TIKTOK</a>
        <a href="https://discord.gg/uq5PYxXr" class="social-card" target="_blank">Discord</a>
    </div>
<audio id="sound-menu" src="click.mp3" preload="auto"></audio>
<audio id="sound-fb" src="1.mp3" preload="auto"></audio>
<audio id="sound-tiktok" src="boom.mp3" preload="auto"></audio>
<audio id="sound-discord" src="2.mp3" preload="auto"></audio>
<script>
    // Hàm phát âm thanh dùng chung
    function playAudio(id) {
        const audio = document.getElementById(id);
        audio.currentTime = 0; // Đưa về đầu
        audio.play().catch(e => console.log("Trình duyệt chưa cho phép phát âm thanh"));
    }

    // 1. Âm thanh cho Menu (Nav-box)
    document.querySelectorAll('.nav-box').forEach(item => {
        item.addEventListener('mouseenter', () => playAudio('sound-menu'));
    });

    // 2. Âm thanh cho từng mạng xã hội
    // Gán sự kiện cho từng thẻ <a> trong social-container
    const socialLinks = document.querySelectorAll('.social-card');
    
    // Facebook (phần tử thứ 0)
    socialLinks[0].addEventListener('mouseenter', () => playAudio('sound-fb'));
    
    // TikTok (phần tử thứ 1)
    socialLinks[1].addEventListener('mouseenter', () => playAudio('sound-tiktok'));
    
    // Discord (phần tử thứ 2)
    socialLinks[2].addEventListener('mouseenter', () => playAudio('sound-discord'));
</script>
</body>
</html>
